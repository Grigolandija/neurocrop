name: Build and deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options: [staging, production]

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        run: echo "value=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/neurocrop-backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.image.outputs.value }}

  deploy:
    needs: image
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.VPS_SSH_PRIVATE_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H '${{ secrets.VPS_HOST }}' >> ~/.ssh/known_hosts
      - name: Deploy immutable image
        run: |
          scp deploy/deploy.sh deploy/rollback.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/neurocrop-deploy/"
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "sh /opt/neurocrop-deploy/deploy.sh '${{ inputs.environment }}' '${{ needs.image.outputs.image }}'"
