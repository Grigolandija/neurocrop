name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: neurocrop
          POSTGRES_PASSWORD: neurocrop-ci
          POSTGRES_DB: neurocrop_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U neurocrop -d neurocrop_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: neurocrop
      PGPASSWORD: neurocrop-ci
      PGDATABASE: neurocrop_ci
      NODE_ENV: test
      API_PORT: 3100
      SESSION_SECURE: "false"
      ALLOWED_ORIGINS: http://127.0.0.1:4173
      TENANT_TEST_PASSWORD: NeuroCrop-CI-Password-2026
      TENANT_TEST_BASE_URL: http://127.0.0.1:3100
      TENANT_A_EMAIL: tenant-a@ci.neurocrop.test
      TENANT_A_PASSWORD: NeuroCrop-CI-Password-2026
      TENANT_B_EMAIL: tenant-b@ci.neurocrop.test
      TENANT_B_PASSWORD: NeuroCrop-CI-Password-2026
      CHIRPSTACK_API_URL: http://127.0.0.1:8099/api
      CHIRPSTACK_API_TOKEN: ci-token
      CHIRPSTACK_APPLICATION_ID: ci-application
      CHIRPSTACK_DEVICE_PROFILE_ID: ci-profile
      DEFAULT_OTAA_APP_KEY: 000102030405060708090a0b0c0d0e0f
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm test
      - run: npm run migrate
      - run: node scripts/seed-ci-tenants.mjs
      - name: Start ChirpStack mock
        run: node tests/chirpstack-mock.mjs > /tmp/chirpstack-mock.log 2>&1 &
      - name: Start API
        run: node api.js > /tmp/neurocrop-api.log 2>&1 & echo $! > /tmp/neurocrop-api.pid
      - name: Wait for API
        run: |
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:3100/health && exit 0
            sleep 1
          done
          cat /tmp/neurocrop-api.log
          exit 1
      - run: npm run test:tenant
        env:
          RUN_API_INTEGRATION: "true"
      - name: API log on failure
        if: failure()
        run: cat /tmp/neurocrop-api.log || true
      - name: Build backend image
        working-directory: .
        run: docker build -t neurocrop-backend:${{ github.sha }} backend

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: neurocrop
          POSTGRES_PASSWORD: neurocrop-e2e
          POSTGRES_DB: neurocrop_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U neurocrop -d neurocrop_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: neurocrop
      PGPASSWORD: neurocrop-e2e
      PGDATABASE: neurocrop_e2e
      NODE_ENV: test
      API_PORT: 3100
      SESSION_SECURE: "false"
      ALLOWED_ORIGINS: http://127.0.0.1:4173
      TENANT_TEST_PASSWORD: NeuroCrop-CI-Password-2026
      E2E_PASSWORD: NeuroCrop-CI-Password-2026
      E2E_API_URL: http://127.0.0.1:3100
      E2E_FRONTEND_URL: http://127.0.0.1:4173
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Prepare backend
        working-directory: backend
        run: npm ci --ignore-scripts && npm run migrate && node scripts/seed-ci-tenants.mjs
      - name: Start services
        run: |
          (cd backend && node api.js > /tmp/neurocrop-e2e-api.log 2>&1 &)
          pnpm dev --host 127.0.0.1 --port 4173 > /tmp/neurocrop-e2e-frontend.log 2>&1 &
          for url in http://127.0.0.1:3100/health http://127.0.0.1:4173/; do
            for attempt in $(seq 1 30); do
              curl --fail --silent "$url" >/dev/null && break
              sleep 1
            done
            curl --fail --silent "$url" >/dev/null
          done
      - run: pnpm test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
