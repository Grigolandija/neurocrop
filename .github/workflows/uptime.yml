name: Production uptime

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check public API
        id: health
        continue-on-error: true
        run: curl --fail --show-error --silent --max-time 15 https://api.neurocrop.lt/health
      - name: Send outage email
        if: steps.health.outcome == 'failure'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MONITOR_EMAIL_TO: ${{ secrets.MONITOR_EMAIL_TO }}
        run: |
          test -n "$RESEND_API_KEY"
          test -n "$MONITOR_EMAIL_TO"
          payload=$(jq -n \
            --arg to "$MONITOR_EMAIL_TO" \
            --arg time "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{from:"NeuroCrop Monitor <monitor@neurocrop.lt>",to:[$to],subject:"[NeuroCrop] Production API is unreachable",text:("The external monitor could not reach https://api.neurocrop.lt/health at " + $time + ". Check the VPS, network, Caddy, Docker and API container.")}')
          curl --fail --show-error --silent https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload"
          exit 1
