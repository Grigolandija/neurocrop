services:
  neurocrop-frontend-staging:
    image: ${NEUROCROP_FRONTEND_IMAGE:?Set NEUROCROP_FRONTEND_IMAGE}
    container_name: neurocrop-frontend-staging
    restart: unless-stopped
    networks:
      - chirpstack
    ports:
      - "127.0.0.1:4173:80"
    environment:
      NEUROCROP_API_BASE_URL: /api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  neurocrop-api-staging:
    image: ${NEUROCROP_BACKEND_IMAGE:?Set NEUROCROP_BACKEND_IMAGE}
    container_name: neurocrop-api-staging
    restart: unless-stopped
    networks:
      - chirpstack
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NODE_ENV: staging
      API_PORT: 3000
      TRUST_PROXY_HOPS: "1"
      PGHOST: postgresql
      PGUSER: ${PGUSER:-chirpstack}
      PGPASSWORD: ${PGPASSWORD:?Set PGPASSWORD}
      PGDATABASE: ${PGDATABASE:-neurocrop_staging}
      MEASUREMENT_RETENTION_DAYS: ${MEASUREMENT_RETENTION_DAYS:-35}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://staging.194-135-91-65.nip.io}
      AUTH_LOGIN_RATE_LIMIT: "100"
      AUTH_REGISTRATION_RATE_LIMIT: "100"
    secrets:
      - session_secret
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  chirpstack:
    external: true
    name: chirpstack_default

secrets:
  session_secret:
    file: /opt/neurocrop-deploy/staging/session_secret
